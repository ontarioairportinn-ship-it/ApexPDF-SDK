name: ApexPDF SDK CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  native-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.302
      - name: Configure Release
        run: cmake --preset windows-x64-release
      - name: Build Release
        run: cmake --build --preset windows-x64-release
      - name: Test C and C++ ABI consumers
        run: ctest --preset windows-x64-release
      - name: Build managed binding
        run: dotnet build tests/dotnet/ApexPdf.Sdk.ManagedTests/ApexPdf.Sdk.ManagedTests.csproj -c Release
      - name: Test managed safe-handle lifecycle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/evidence | Out-Null
          New-Item -ItemType File -Force artifacts/evidence/managed-lifecycle.txt | Out-Null
          Copy-Item artifacts/windows-x64-release/ApexPdfSdk.dll tests/dotnet/ApexPdf.Sdk.ManagedTests/bin/Release/net10.0/
          $env:APX_MANAGED_TEST_LOG = (Resolve-Path artifacts/evidence/managed-lifecycle.txt).Path
          dotnet tests/dotnet/ApexPdf.Sdk.ManagedTests/bin/Release/net10.0/ApexPdf.Sdk.ManagedTests.dll *>&1 |
            Tee-Object artifacts/evidence/managed-lifecycle.txt
          if ($LASTEXITCODE -ne 0) { throw "Managed lifecycle test failed: $LASTEXITCODE" }
      - name: Upload managed lifecycle diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ApexPdfSdk-managed-lifecycle-diagnostics
          path: artifacts/evidence/managed-lifecycle.txt
          if-no-files-found: error
      - name: Record toolchain evidence
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/evidence | Out-Null
          cmake --version | Out-File artifacts/evidence/toolchain.txt
          Get-Content artifacts/windows-x64-release/CMakeCache.txt |
            Where-Object { $_ -match '^CMAKE_(C|CXX)_COMPILER:' } |
            Out-File artifacts/evidence/toolchain.txt -Append
          Get-ChildItem artifacts/windows-x64-release/CMakeFiles -Recurse -Filter CMakeCCompiler.cmake |
            Select-Object -First 1 |
            Get-Content |
            Select-String 'CMAKE_C_COMPILER_VERSION|CMAKE_C_COMPILER_ARCHITECTURE_ID' |
            Out-File artifacts/evidence/toolchain.txt -Append
          "architecture=x64" | Out-File artifacts/evidence/toolchain.txt -Append
          "configure=cmake --preset windows-x64-release" | Out-File artifacts/evidence/toolchain.txt -Append
          "build=cmake --build --preset windows-x64-release" | Out-File artifacts/evidence/toolchain.txt -Append
          "test=ctest --preset windows-x64-release" | Out-File artifacts/evidence/toolchain.txt -Append
      - name: Package native SDK
        run: cpack --preset windows-x64-release
      - name: Package managed SDK
        shell: pwsh
        run: dotnet pack src/dotnet/ApexPdf.Sdk/ApexPdf.Sdk.csproj -c Release --no-build -p:ApexPdfNativeRoot="$((Resolve-Path artifacts/windows-x64-release).Path)" -o artifacts/packages
      - name: Test packaged C and C++ consumers
        shell: pwsh
        run: |
          $package = Get-ChildItem artifacts/windows-x64-release/ApexPdfSdk-*.zip | Select-Object -First 1
          ./tests/Test-PackageConsumer.ps1 -Package $package.FullName -WorkDirectory artifacts/package-consumer
      - name: Record package hash
        shell: pwsh
        run: Get-FileHash artifacts/windows-x64-release/ApexPdfSdk-*.zip -Algorithm SHA256 | Format-List | Out-File artifacts/evidence/package-sha256.txt
      - name: Upload native SDK package
        uses: actions/upload-artifact@v4
        with:
          name: ApexPdfSdk-windows-x64
          path: artifacts/windows-x64-release/ApexPdfSdk-*.zip
          if-no-files-found: error
      - name: Upload managed SDK package
        uses: actions/upload-artifact@v4
        with:
          name: ApexPdfSdk-managed
          path: artifacts/packages/ApexPdf.Sdk.*.nupkg
          if-no-files-found: error
      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: ApexPdfSdk-windows-x64-evidence
          path: artifacts/evidence/
          if-no-files-found: error

  native-windows-x64-asan:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AddressSanitizer
        run: cmake --preset windows-x64-asan
      - name: Build AddressSanitizer
        run: cmake --build --preset windows-x64-asan
      - name: Test AddressSanitizer
        run: ctest --preset windows-x64-asan

  native-windows-x64-analysis:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure native analysis
        run: cmake --preset windows-x64-analyze
      - name: Run native analysis
        run: cmake --build --preset windows-x64-analyze
