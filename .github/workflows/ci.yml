name: ApexPDF SDK CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  native-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.302
      - name: Build, test, and package native SDK with MSVC
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set "VSROOT=%%i"
          call "%VSROOT%\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          cmake --preset windows-x64-release
          cmake --build --preset windows-x64-release
          ctest --preset windows-x64-release
          cpack --preset windows-x64-release -B "%CD%\artifacts\packages\native"
      - name: Build managed binding
        run: dotnet build tests/dotnet/ApexPdf.Sdk.ManagedTests/ApexPdf.Sdk.ManagedTests.csproj -c Release
      - name: Test managed safe-handle lifecycle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/evidence | Out-Null
          New-Item -ItemType File -Force artifacts/evidence/managed-markers.txt | Out-Null
          New-Item -ItemType File -Force artifacts/evidence/managed-console.txt | Out-Null
          "shell-start" | Add-Content artifacts/evidence/managed-markers.txt
          $nativePackage = Get-ChildItem artifacts/packages/native/ApexPdfSdk-*.zip | Select-Object -First 1
          "package=$($nativePackage.FullName)" | Add-Content artifacts/evidence/managed-markers.txt
          Expand-Archive $nativePackage.FullName artifacts/managed-native-package -Force
          "extract-complete" | Add-Content artifacts/evidence/managed-markers.txt
          Get-ChildItem artifacts/managed-native-package -Recurse -File |
            ForEach-Object { "package-file=$($_.FullName)" } |
            Add-Content artifacts/evidence/managed-markers.txt
          $native = Get-ChildItem artifacts/managed-native-package -Recurse -Filter ApexPdfSdk.dll | Select-Object -First 1
          "native-search-complete" | Add-Content artifacts/evidence/managed-markers.txt
          if ($null -eq $native) { throw "The native SDK package does not contain ApexPdfSdk.dll." }
          "native=$($native.FullName)" | Add-Content artifacts/evidence/managed-markers.txt
          "assembly-exists=$(Test-Path tests/dotnet/ApexPdf.Sdk.ManagedTests/bin/Release/net10.0/ApexPdf.Sdk.ManagedTests.dll)" | Add-Content artifacts/evidence/managed-markers.txt
          "dotnet=$((Get-Command dotnet).Source)" | Add-Content artifacts/evidence/managed-markers.txt
          Copy-Item $native.FullName tests/dotnet/ApexPdf.Sdk.ManagedTests/bin/Release/net10.0/
          "copy-complete" | Add-Content artifacts/evidence/managed-markers.txt
          $env:APX_MANAGED_TEST_LOG = (Resolve-Path artifacts/evidence/managed-markers.txt).Path
          "launch" | Add-Content artifacts/evidence/managed-markers.txt
          dotnet tests/dotnet/ApexPdf.Sdk.ManagedTests/bin/Release/net10.0/ApexPdf.Sdk.ManagedTests.dll *>&1 |
            Tee-Object artifacts/evidence/managed-console.txt
          if ($LASTEXITCODE -ne 0) { throw "Managed lifecycle test failed: $LASTEXITCODE" }
      - name: Upload managed lifecycle diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ApexPdfSdk-managed-lifecycle-diagnostics
          path: artifacts/evidence/managed-*.txt
          if-no-files-found: error
      - name: Record toolchain evidence
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/evidence | Out-Null
          cmake --version | Out-File artifacts/evidence/toolchain.txt
          Get-Content artifacts/windows-x64-release/CMakeCache.txt |
            Where-Object { $_ -match '^CMAKE_(C|CXX)_COMPILER:' } |
            Out-File artifacts/evidence/toolchain.txt -Append
          Get-ChildItem artifacts/windows-x64-release/CMakeFiles -Recurse -Filter CMakeCCompiler.cmake |
            Select-Object -First 1 |
            Get-Content |
            Select-String 'CMAKE_C_COMPILER_VERSION|CMAKE_C_COMPILER_ARCHITECTURE_ID' |
            Out-File artifacts/evidence/toolchain.txt -Append
          "architecture=x64" | Out-File artifacts/evidence/toolchain.txt -Append
          "configure=cmake --preset windows-x64-release" | Out-File artifacts/evidence/toolchain.txt -Append
          "build=cmake --build --preset windows-x64-release" | Out-File artifacts/evidence/toolchain.txt -Append
          "test=ctest --preset windows-x64-release" | Out-File artifacts/evidence/toolchain.txt -Append
      - name: Package managed SDK
        shell: pwsh
        run: |
          $native = Get-ChildItem artifacts/managed-native-package -Recurse -Filter ApexPdfSdk.dll | Select-Object -First 1
          if ($null -eq $native) { throw "The extracted native SDK package does not contain ApexPdfSdk.dll." }
          dotnet pack src/dotnet/ApexPdf.Sdk/ApexPdf.Sdk.csproj -c Release --no-build -p:ApexPdfNativeRoot="$($native.DirectoryName)" -o artifacts/packages
      - name: Test packaged C and C++ consumers
        shell: pwsh
        run: |
          $package = Get-ChildItem artifacts/packages/native/ApexPdfSdk-*.zip | Select-Object -First 1
          ./tests/Test-PackageConsumer.ps1 -Package $package.FullName -WorkDirectory artifacts/package-consumer
      - name: Record package hash
        shell: pwsh
        run: Get-FileHash artifacts/packages/native/ApexPdfSdk-*.zip -Algorithm SHA256 | Format-List | Out-File artifacts/evidence/package-sha256.txt
      - name: Upload native SDK package
        uses: actions/upload-artifact@v4
        with:
          name: ApexPdfSdk-windows-x64
          path: artifacts/packages/native/ApexPdfSdk-*.zip
          if-no-files-found: error
      - name: Upload managed SDK package
        uses: actions/upload-artifact@v4
        with:
          name: ApexPdfSdk-managed
          path: artifacts/packages/ApexPdf.Sdk.*.nupkg
          if-no-files-found: error
      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: ApexPdfSdk-windows-x64-evidence
          path: artifacts/evidence/
          if-no-files-found: error

  native-windows-x64-asan:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test AddressSanitizer with MSVC
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set "VSROOT=%%i"
          call "%VSROOT%\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          cmake --preset windows-x64-asan
          cmake --build --preset windows-x64-asan
          ctest --preset windows-x64-asan

  native-windows-x64-analysis:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run native analysis with MSVC
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set "VSROOT=%%i"
          call "%VSROOT%\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          cmake --preset windows-x64-analyze
          cmake --build --preset windows-x64-analyze
